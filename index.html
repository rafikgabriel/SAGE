<head>

<style>
:root{--bg:#FFF;--surface:#F4F3EE;--surfaceHover:#EAE9E2;--border:#D2D0C8;--borderLight:#DDDBD4;--text:#1A1A1A;--textMuted:#555;--textDim:#888;--accent:#9E7C2B;--accentSoft:rgba(158,124,43,.10);--success:#2E7D53;--successSoft:rgba(46,125,83,.10);--danger:#B83220;--dangerSoft:rgba(184,50,32,.08);--high:#B83220;--medium:#C47F09;--low:#2670A0;--info:#5B6ABF;--infoSoft:rgba(91,106,191,.10)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans','Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100dvh;overflow:hidden;display:flex;flex-direction:column}
a{color:var(--accent);text-decoration:none}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;background:var(--surface);border-bottom:1px solid var(--borderLight);flex-shrink:0}
.content{flex:1;overflow-y:auto;padding:20px;-webkit-overflow-scrolling:touch}
.bottom-nav{display:flex;background:var(--surface);border-top:1px solid var(--borderLight);flex-shrink:0;padding:6px 0 max(6px,env(safe-area-inset-bottom))}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 0;border:none;background:none;color:var(--textDim);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer}
.nav-btn.active{color:var(--accent)}
.nav-btn svg{width:26px;height:26px}
.section-title{font-family:'Playfair Display',Georgia,serif;font-size:30px;font-weight:600;margin-bottom:4px}
.card{background:var(--surface);border:1px solid var(--borderLight);border-radius:12px;padding:14px 16px;margin-bottom:8px}
.btn-primary{background:var(--accent);border:none;color:#FFF;border-radius:10px;padding:12px 22px;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:600;cursor:pointer}
.btn-secondary{background:var(--surfaceHover);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:10px 18px;font-family:'DM Sans',sans-serif;font-size:15px;cursor:pointer}
.btn-sm{background:var(--surfaceHover);border:1px solid var(--border);color:var(--textMuted);border-radius:8px;padding:6px 12px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer}
.btn-icon{width:40px;height:40px;border-radius:10px;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;background:var(--accentSoft);color:var(--accent);flex-shrink:0}
.input{width:100%;background:var(--surfaceHover);border:1px solid var(--border);border-radius:10px;padding:14px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:17px;outline:none}
.input::placeholder{color:var(--textDim)}
.input-sm{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--textMuted);font-family:'DM Sans',sans-serif;font-size:15px;outline:none}
.pill{font-size:12px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;padding:3px 9px;border-radius:5px}
.cat-pill{font-size:11px;padding:2px 7px;border-radius:4px;background:var(--infoSoft);color:var(--info)}
.row{display:flex;align-items:center;gap:10px}
.row-between{display:flex;align-items:center;justify-content:space-between}
.flex-1{flex:1;min-width:0}
.gap-8{gap:8px}
.gap-6{gap:6px}
.truncate{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.icon-btn-sm{background:none;border:none;color:var(--textDim);cursor:pointer;padding:4px;opacity:.6;display:flex;align-items:center}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--borderLight);border-radius:14px;padding:18px 14px;cursor:pointer}
.stat-value{font-family:'Playfair Display',Georgia,serif;font-size:32px;font-weight:700}
.stat-label{font-size:14px;color:var(--textMuted);margin-top:2px}
.checkbox{width:26px;height:26px;min-width:26px;border-radius:7px;border:2px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--success);flex-shrink:0}
.checkbox.done{border-color:var(--success);background:var(--successSoft)}
.msg{max-width:85%;padding:14px 18px;font-size:17px;line-height:1.6;white-space:pre-wrap;word-wrap:break-word}
.msg-user{align-self:flex-end;background:var(--accent);color:#FFF;border-radius:16px 16px 4px 16px}
.msg-ai{align-self:flex-start;background:var(--surfaceHover);border:1px solid var(--border);border-radius:16px 16px 16px 4px}
.chat-input-row{display:flex;gap:8px;margin-top:10px;flex-shrink:0;align-items:center}
.send-btn,.voice-btn{width:50px;height:50px;border-radius:12px;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.voice-btn{background:var(--surfaceHover);color:var(--textMuted);position:relative}
.voice-btn.recording{background:var(--dangerSoft);color:var(--danger);animation:pr 1.5s ease infinite}
@keyframes pr{0%{box-shadow:0 0 0 0 rgba(184,50,32,.3)}70%{box-shadow:0 0 0 10px rgba(184,50,32,0)}100%{box-shadow:0 0 0 0 rgba(184,50,32,0)}}
.voice-btn.recording::before{content:'';position:absolute;width:10px;height:10px;border-radius:50%;background:var(--danger);top:6px;right:6px;animation:bdd 1s infinite}
@keyframes bdd{0%,100%{opacity:1}50%{opacity:.3}}
.note-item{padding:14px 16px;border-radius:10px;cursor:pointer;border:1px solid var(--borderLight);background:var(--surface);margin-bottom:6px;position:relative;overflow:hidden}
.note-bar{position:absolute;top:0;left:0;width:4px;height:100%;border-radius:10px 0 0 10px}
.note-editor{width:100%;min-height:200px;background:var(--surface);border:1px solid var(--borderLight);border-radius:12px;padding:16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:17px;line-height:1.7;outline:none;resize:none}
.form-panel{background:var(--surfaceHover);border-radius:12px;padding:16px;margin-bottom:16px;border:1px solid var(--border)}
.priority-btn{border-radius:6px;padding:6px 14px;font-size:15px;font-family:'DM Sans',sans-serif;cursor:pointer;text-transform:capitalize;background:transparent}
.voice-overlay{display:none;position:fixed;inset:0;background:rgba(255,255,255,.95);z-index:999;flex-direction:column;align-items:center;justify-content:center;gap:20px}
.voice-overlay.active{display:flex}
.voice-ring{width:120px;height:120px;border-radius:50%;background:var(--dangerSoft);border:3px solid var(--danger);display:flex;align-items:center;justify-content:center;animation:pr 1.5s ease infinite}
.voice-ring svg{width:48px;height:48px;color:var(--danger)}
.search-results{background:var(--surface);border:1px solid var(--borderLight);border-radius:12px;margin-top:8px;overflow:hidden}
.search-result{padding:14px 16px;border-bottom:1px solid var(--borderLight);cursor:pointer;display:flex;align-items:center;gap:12px}
.search-result:last-child{border-bottom:none}
.search-badge{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;padding:2px 8px;border-radius:4px;flex-shrink:0}
.briefing-card{background:linear-gradient(135deg,var(--accentSoft),rgba(158,124,43,.02));border:1px solid rgba(158,124,43,.2);border-radius:14px;padding:18px;margin-bottom:12px;cursor:pointer}
.overdue{border-left:3px solid var(--danger)!important}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:998;align-items:center;justify-content:center;padding:20px}
.modal-overlay.active{display:flex}
.modal{background:var(--bg);border-radius:16px;padding:24px;width:100%;max-width:420px;max-height:80vh;overflow-y:auto}
.filter-btn{padding:6px 14px;border-radius:20px;font-size:14px;font-family:'DM Sans',sans-serif;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--textMuted)}
.filter-btn.active{background:var(--accent);color:#FFF;border-color:var(--accent)}
@keyframes bl{0%,20%{opacity:1}50%{opacity:.3}80%,100%{opacity:1}}
.typing::after{content:'...';animation:bl 1.4s infinite}
.sync-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px}
</style>
</head>
<body>
<div class="topbar">
  <div><div style="font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:var(--accent)">Sage</div><div style="font-size:13px;color:var(--textDim);text-transform:uppercase;letter-spacing:1.5px">Personal Secretary</div></div>
  <div style="text-align:right"><div style="font-size:16px;font-weight:500">Rafik S. Gabriel</div><div style="font-size:14px;color:var(--textDim)">Chairman · Metal Tube</div><div id="syncBadge" style="font-size:12px;color:var(--textDim);margin-top:2px"><span class="sync-dot" style="background:var(--textDim)"></span>Connecting...</div></div>
</div>
<div class="content" id="content"></div>
<div class="voice-overlay" id="voiceOverlay" onclick="stopVoice()">
  <div class="voice-ring"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z"/></svg></div>
  <div id="voiceOverlayText" style="font-size:20px;color:var(--text);text-align:center;max-width:80%">Listening...</div>

</div>
<div class="modal-overlay" id="editModal"><div class="modal" id="editModalContent"></div></div>
<div class="bottom-nav">
  <button class="nav-btn active" data-tab="home" onclick="switchTab('home')"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>Home</button>
  <button class="nav-btn" data-tab="tasks" onclick="switchTab('tasks')"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>Tasks</button>
  <button class="nav-btn" data-tab="notes" onclick="switchTab('notes')"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>Notes</button>
  <button class="nav-btn" data-tab="schedule" onclick="switchTab('schedule')"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path stroke-linecap="round" d="M16 2v4M8 2v4M3 10h18"/></svg>Schedule</button>
  <button class="nav-btn" data-tab="chat" onclick="switchTab('chat')"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>Sage</button>
  <button class="nav-btn" data-tab="settings" onclick="switchTab('settings')"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><circle cx="12" cy="12" r="3"/></svg><span style="font-size:11px">Settings</span></button>
</div>
<input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(this)">
<script>
/* === UTILS === */
var uid=function(){return Math.random().toString(36).slice(2,10)};
var todayStr=function(){return new Date().toISOString().split('T')[0]};
var fmtDate=function(d){return new Date(d+'T12:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})};
var fmtTime=function(t){var p=t.split(':'),hr=+p[0],m=p[1];return(hr>12?hr-12:hr||12)+':'+m+(hr>=12?' PM':' AM')};
var greeting=function(){var h=new Date().getHours();return h<12?'Good morning':h<17?'Good afternoon':'Good evening'};
function esc(s){if(!s)return'';var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function isOverdue(d){return d<todayStr()}
var CATEGORIES=['General','Metal Projects','Scaffolding','Formwork','Storage','Sports Structures','Metal Arts','Export/MENA'];
var micSVG='<svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z"/></svg>';
var plusSVG='<svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" d="M12 5v14m-7-7h14"/></svg>';
var trashSVG='<svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>';
var checkSVG='<svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>';
var starSVG='<svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>';
var editSVG='<svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>';
var searchSVG='<svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path stroke-linecap="round" d="M21 21l-4.35-4.35"/></svg>';
var calSVG='<svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>';

/* === STATE === */
var DEFAULTS={
  tasks:[{id:uid(),title:'Review BD Manager candidate shortlist',priority:'high',dueDate:todayStr(),done:false,starred:true,category:'General'},{id:uid(),title:'Prepare Q1 export performance report',priority:'high',dueDate:'2026-03-07',done:false,starred:false,category:'Export/MENA'},{id:uid(),title:'Follow up with MENA distribution leads',priority:'medium',dueDate:'2026-03-05',done:false,starred:false,category:'Export/MENA'}],
  notes:[{id:uid(),title:'BD Manager Hiring Notes',body:"Key requirements:\n- 5+ years in steel/scaffolding/formwork\n- MENA market experience\n\nPotential sources:\n- LinkedIn targeting\n- LinkMisr, ACROW competitors",color:'#9E7C2B'}],
  events:[{id:uid(),title:'Leadership sync with Eng. Samy',date:todayStr(),time:'10:00',duration:60,note:'Monthly review',repeat:'none'},{id:uid(),title:'BD Manager interview',date:'2026-03-05',time:'14:00',duration:45,note:'Candidate from scaffolding',repeat:'none'}],
  chatMessages:[{role:'assistant',content:''}]
};
function loadState(){
  var s=null;try{s=JSON.parse(localStorage.getItem('sage_data'))}catch(e){}
  var tasks=(s&&s.tasks)?s.tasks:DEFAULTS.tasks;
  var notes=(s&&s.notes)?s.notes:DEFAULTS.notes;
  var events=(s&&s.events)?s.events:DEFAULTS.events;
  events.forEach(function(e){if(!e.repeat)e.repeat='none'});
  tasks.forEach(function(t){if(!t.category)t.category='General'});
  var chatMessages=(s&&s.chatMessages&&s.chatMessages.length>0)?s.chatMessages:[{role:'assistant',content:greeting()+", Rafik. I'm Sage, your personal secretary.\n\nHow can I assist you today?"}];
  return{tab:'home',tasks:tasks,notes:notes,events:events,chatMessages:chatMessages,activeNote:null,addingTask:false,addingEvent:false,chatLoading:false,searchQuery:'',briefing:null,briefingLoading:false,taskFilter:'all'};
}
var state=loadState();
function saveLocal(){try{localStorage.setItem('sage_data',JSON.stringify({tasks:state.tasks,notes:state.notes,events:state.events,chatMessages:state.chatMessages}))}catch(e){}}
function save(){saveLocal();cloudSave();}

/* ======= FIREBASE REAL-TIME SYNC ======= */
var firebaseConfig={
  apiKey:"AIzaSyB6Jvv7g8ESo1FR2su8vCfu696lvug1qvw",
  authDomain:"sage-ee8cd.firebaseapp.com",
  databaseURL:"https://sage-ee8cd-default-rtdb.firebaseio.com",
  projectId:"sage-ee8cd",
  storageBucket:"sage-ee8cd.firebasestorage.app",
  messagingSenderId:"791914096529",
  appId:"1:791914096529:web:d8b75e8e5d69c1de891c30"
};
var fbRef=null,syncPaused=false,lastSyncTime=0;

function initFirebase(){
  try{
    firebase.initializeApp(firebaseConfig);
    var db=firebase.database();
    fbRef=db.ref('sage/data');
    // Listen for changes from other devices
    fbRef.on('value',function(snap){
      if(syncPaused)return;
      var data=snap.val();
      if(!data||!data.lastModified)return;
      if(data.lastModified>lastSyncTime+500){
        syncPaused=true;
        if(data.tasks){state.tasks=data.tasks;state.tasks.forEach(function(t){if(!t.category)t.category='General'})}
        if(data.notes)state.notes=data.notes;
        if(data.events){state.events=data.events;state.events.forEach(function(e){if(!e.repeat)e.repeat='none'})}
        lastSyncTime=data.lastModified;
        saveLocal();
        render();
        setSyncStatus('synced');
        setTimeout(function(){syncPaused=false},1000);
      }
    });
    // Connection status
    db.ref('.info/connected').on('value',function(snap){
      if(snap.val()===true)setSyncStatus('connected');
      else setSyncStatus('offline');
    });
    setSyncStatus('connected');
  }catch(e){
    console.error('Firebase init error:',e);
    setSyncStatus('offline');
  }
}

function cloudSave(){
  if(!fbRef||syncPaused)return;
  lastSyncTime=Date.now();
  fbRef.set({
    tasks:state.tasks,
    notes:state.notes,
    events:state.events,
    lastModified:lastSyncTime
  }).then(function(){setSyncStatus('synced')}).catch(function(){setSyncStatus('offline')});
}

function setSyncStatus(s){
  var el=document.getElementById('syncBadge');if(!el)return;
  if(s==='synced')el.innerHTML='<span class="sync-dot" style="background:var(--success)"></span>Synced';
  else if(s==='connected')el.innerHTML='<span class="sync-dot" style="background:var(--accent)"></span>Connected';
  else el.innerHTML='<span class="sync-dot" style="background:var(--textDim)"></span>Offline';
}
/* ======= END FIREBASE ======= */

/* === NOTIFICATIONS === */
function initNotifications(){if(!('Notification' in window))return;if(Notification.permission==='default')Notification.requestPermission();setInterval(checkReminders,60000);checkReminders()}
function checkReminders(){if(!('Notification' in window)||Notification.permission!=='granted')return;var now=new Date();var nowStr=todayStr();var nowMin=now.getHours()*60+now.getMinutes();
  state.events.forEach(function(ev){if(ev.date!==nowStr)return;var p=ev.time.split(':');var evMin=(+p[0])*60+(+p[1]);var diff=evMin-nowMin;
    if(diff>=9&&diff<=10){var nk='sage_n_'+ev.id+'_'+nowStr;if(!localStorage.getItem(nk)){localStorage.setItem(nk,'1');new Notification('Sage Reminder',{body:ev.title+' in 10 minutes ('+fmtTime(ev.time)+')'})}}
  })}

/* === RECURRING === */
function generateRecurring(){var nowStr=todayStr();
  state.events.forEach(function(ev){if(ev.repeat==='none'||!ev.repeat||ev.date>nowStr)return;
    var hasNext=state.events.some(function(e){return e.parentId===ev.id&&e.date>nowStr});if(hasNext)return;
    var d=new Date(ev.date+'T12:00');var next;
    if(ev.repeat==='daily'){next=new Date(d);next.setDate(d.getDate()+1)}
    else if(ev.repeat==='weekly'){next=new Date(d);next.setDate(d.getDate()+7)}
    else if(ev.repeat==='monthly'){next=new Date(d);next.setMonth(d.getMonth()+1)}
    if(next){var ns=next.toISOString().split('T')[0];if(ns>=nowStr){state.events.push({id:uid(),title:ev.title,date:ns,time:ev.time,duration:ev.duration,note:ev.note,repeat:ev.repeat,parentId:ev.id});save()}}
  })}

  var end=new Date(ev.date+'T'+ev.time);end.setMinutes(end.getMinutes()+ev.duration);
  var dtE=end.toISOString().replace(/[-:]/g,'').split('.')[0];
  var rr='';if(ev.repeat==='daily')rr='\nRRULE:FREQ=DAILY';else if(ev.repeat==='weekly')rr='\nRRULE:FREQ=WEEKLY';else if(ev.repeat==='monthly')rr='\nRRULE:FREQ=MONTHLY';
  var ics='BEGIN:VCALENDAR\nVERSION:2.0\nBEGIN:VEVENT\nDTSTART:'+dtS+'\nDTEND:'+dtE+rr+'\nSUMMARY:'+ev.title+'\nDESCRIPTION:'+(ev.note||'')+'\nEND:VEVENT\nEND:VCALENDAR';
  var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([ics],{type:'text/calendar'}));a.download=ev.title.replace(/\s+/g,'_')+'.ics';document.body.appendChild(a);a.click();document.body.removeChild(a)}

  if(!an)h+='<button class="btn-icon" onclick="addNote()">'+plusSVG+'</button>';
  else h+='<button class="icon-btn-sm" style="opacity:1;color:var(--danger)" onclick="removeNote(\''+an.id+'\')">'+trashSVG+'</button>';h+='</div>';
  if(!an){if(!state.notes.length)h+='<div style="text-align:center;padding:40px;color:var(--textDim);font-size:17px">No notes yet.</div>';
    else state.notes.forEach(function(n){h+='<div class="note-item" onclick="state.activeNote=\''+n.id+'\';render()"><div class="note-bar" style="background:'+n.color+'"></div><div class="truncate" style="font-size:17px;font-weight:500;padding-left:8px">'+esc(n.title||'Untitled')+'</div><div class="truncate" style="font-size:15px;color:var(--textDim);margin-top:4px;padding-left:8px">'+esc((n.body||'').slice(0,80)||'Empty note')+'</div></div>'})}
  else h+='<input class="input" value="'+esc(an.title)+'" onchange="updateNote(\''+an.id+'\',\'title\',this.value)" style="background:transparent;border:none;font-family:Playfair Display,serif;font-size:24px;font-weight:600;padding:0;margin-bottom:14px"><textarea class="note-editor" style="flex:1" oninput="updateNote(\''+an.id+'\',\'body\',this.value)" placeholder="Start typing...">'+esc(an.body)+'</textarea>';
  return h}
function addNote(){var c=['#9E7C2B','#2670A0','#B83220','#7B5EA7','#2E7D53'];state.notes.unshift({id:uid(),title:'Untitled Note',body:'',color:c[Math.floor(Math.random()*5)]});state.activeNote=state.notes[0].id;save();render()}
function updateNote(id,f,v){var n=state.notes.find(function(x){return x.id===id});if(n)n[f]=v;save()}
function removeNote(id){state.notes=state.notes.filter(function(x){return x.id!==id});state.activeNote=null;save();render()}

/* === SCHEDULE === */
function renderSchedule(){
  var sorted=[].concat(state.events).sort(function(a,b){return(a.date+a.time).localeCompare(b.date+b.time)});
  var g={};sorted.forEach(function(e){if(!g[e.date])g[e.date]=[];g[e.date].push(e)});
  var up=Object.keys(g).filter(function(d){return d>=todayStr()}).sort();var past=Object.keys(g).filter(function(d){return d<todayStr()}).sort().reverse();
  var h='<div class="row-between" style="margin-bottom:20px"><div><div class="section-title">Schedule</div><div style="font-size:16px;color:var(--textMuted)">'+state.events.filter(function(e){return e.date>=todayStr()}).length+' upcoming</div></div><div class="row gap-8"><button class="btn-icon" style="background:var(--surfaceHover);color:var(--textMuted)" onclick="startVoice(\'overlay\')">'+micSVG+'</button><button class="btn-icon" onclick="state.addingEvent=!state.addingEvent;render()">'+plusSVG+'</button></div></div>';
  if(state.addingEvent)h+='<div class="form-panel"><input class="input" id="evTitle" placeholder="Event title" onkeydown="if(event.key===\'Enter\')addEvent()" style="margin-bottom:10px"><div class="row gap-8" style="flex-wrap:wrap"><input type="date" class="input-sm" id="evDate" value="'+todayStr()+'"><input type="time" class="input-sm" id="evTime" value="09:00"><select class="input-sm" id="evDuration"><option value="15">15m</option><option value="30">30m</option><option value="60" selected>1h</option><option value="90">1.5h</option><option value="120">2h</option></select><select class="input-sm" id="evRepeat"><option value="none">No repeat</option><option value="daily">Daily</option><option value="weekly">Weekly</option><option value="monthly">Monthly</option></select><button class="btn-primary" onclick="addEvent()" style="margin-left:auto">Add</button></div><input class="input" id="evNote" placeholder="Notes (optional)" style="font-size:16px;margin-top:10px"></div>';
  h+='<div style="flex:1;overflow-y:auto">';
  if(!up.length&&!past.length)h+='<div style="text-align:center;padding:40px;color:var(--textDim);font-size:17px">No events.</div>';
  up.forEach(function(d){h+='<div style="margin-bottom:20px"><div style="font-size:14px;font-weight:600;color:'+(d===todayStr()?'var(--accent)':'var(--textMuted)')+';text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">'+(d===todayStr()?'Today':fmtDate(d))+'</div>';g[d].forEach(function(ev){h+='<div class="card row gap-8" style="align-items:flex-start"><span style="min-width:60px;font-size:16px;font-weight:600;color:var(--accent)">'+fmtTime(ev.time)+'</span><div class="flex-1"><div style="font-size:17px">'+esc(ev.title)+(ev.repeat&&ev.repeat!=='none'?' <span style="font-size:13px;color:var(--textDim)">&#x1F501;</span>':'')+'</div><div style="font-size:15px;color:var(--textDim);margin-top:2px">'+ev.duration+'min'+(ev.note?' · '+esc(ev.note):'')+'</div></div><button class="icon-btn-sm" onclick="exportICS(state.events.find(function(e){return e.id===\''+ev.id+'\'}))" title="Calendar">'+calSVG+'</button><button class="icon-btn-sm" onclick="openEditEvent(\''+ev.id+'\')">'+editSVG+'</button><button class="icon-btn-sm" onclick="removeEvent(\''+ev.id+'\')">'+trashSVG+'</button></div>'});h+='</div>'});
  if(past.length)h+='<div style="font-size:14px;color:var(--textDim);text-transform:uppercase;letter-spacing:1px;margin:10px 0 8px;border-top:1px solid var(--border);padding-top:14px">Past</div>';
  past.forEach(function(d){h+='<div style="margin-bottom:12px;opacity:.5"><div style="font-size:14px;color:var(--textDim);margin-bottom:6px">'+fmtDate(d)+'</div>';g[d].forEach(function(ev){h+='<div class="card row gap-8" style="padding:12px 16px"><span style="min-width:60px;font-size:15px;color:var(--textDim)">'+fmtTime(ev.time)+'</span><span style="font-size:16px;color:var(--textMuted)">'+esc(ev.title)+'</span></div>'});h+='</div>'});
  h+='</div>';return h}
function addEvent(){var t=document.getElementById('evTitle');if(!t||!t.value.trim())return;state.events.push({id:uid(),title:t.value.trim(),date:document.getElementById('evDate').value,time:document.getElementById('evTime').value,duration:+document.getElementById('evDuration').value,note:(document.getElementById('evNote')||{}).value||'',repeat:(document.getElementById('evRepeat')||{}).value||'none'});state.addingEvent=false;save();render()}
function removeEvent(id){state.events=state.events.filter(function(x){return x.id!==id});save();render()}

/* === CHAT === */
function renderChat(){
  var h='<div class="row-between" style="margin-bottom:16px"><div class="section-title">Sage</div><div class="row gap-8"><button class="btn-sm" onclick="state.chatMessages=[{role:\'assistant\',content:\'Chat cleared.\'}];save();render()">Clear</button><span style="font-size:15px;color:var(--textDim)">AI</span></div></div><div id="chatArea" style="flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px">';
  state.chatMessages.forEach(function(m){h+='<div class="msg '+(m.role==='user'?'msg-user':'msg-ai')+'">'+esc(m.content)+'</div>'});
  if(state.chatLoading)h+='<div class="msg msg-ai"><span class="typing">Thinking</span></div>';
  h+='</div><div class="chat-input-row"><input class="input" id="chatInput" placeholder="Ask Sage..." onkeydown="if(event.key===\'Enter\'&&!event.shiftKey)sendChat()" style="flex:1"><button class="voice-btn '+(isRecording&&voiceTarget==='chat'?'recording':'')+'" id="voiceBtn" onclick="startVoice(\'chat\')"><svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z"/></svg></button><button class="send-btn" style="background:var(--accentSoft);color:var(--accent)" onclick="sendChat()"><svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14m-4-4l4 4-4 4"/></svg></button></div>';return h}
function sendChat(){var inp=document.getElementById('chatInput');var msg=inp?inp.value.trim():'';if(!msg||state.chatLoading)return;inp.value='';state.chatMessages.push({role:'user',content:msg});state.chatLoading=true;save();render();sendChatAPI()}
function sendChatAPI(){var k=localStorage.getItem('sage_api_key');
  if(!k){state.chatMessages.push({role:'assistant',content:"Add your API key in Settings first."});state.chatLoading=false;save();render();return}
  var ctx='You are Sage, secretary to Rafik S. Gabriel, Chairman of Metal Tube (steel, Egypt, 200+ employees). Sectors: Metal Projects, Scaffolding, Formwork, Storage, Sports, Metal Arts. ASME cert in progress, hiring BD Manager.\nTasks: '+state.tasks.filter(function(t){return!t.done}).map(function(t){return t.title+' ('+t.priority+')'}).join('; ')+'\nEvents: '+state.events.filter(function(e){return e.date>=todayStr()}).map(function(e){return e.title+' '+e.date+' '+e.time}).join('; ')+'\nBe professional, concise. Under 200 words.';
  var hist=state.chatMessages.slice(-10).map(function(m){return{role:m.role,content:m.content}});
  fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':k,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:ctx,messages:hist})}).then(function(r){return r.json()}).then(function(d){
    if(d.error)state.chatMessages.push({role:'assistant',content:'Error: '+(d.error.message||'Check API key.')});
    else state.chatMessages.push({role:'assistant',content:d.content?d.content.map(function(b){return b.text||''}).join('\n'):'Try again.'});
    state.chatLoading=false;save();render()}).catch(function(){state.chatMessages.push({role:'assistant',content:'Connection error.'});state.chatLoading=false;save();render()})}

/* === SETTINGS === */
function renderSettings(){var sk=localStorage.getItem('sage_api_key')||'';var mk=sk?sk.slice(0,10)+'...'+sk.slice(-4):'';
  var ns='Notification' in window?(Notification.permission==='granted'?'<span style="color:var(--success)">Enabled</span>':Notification.permission==='denied'?'<span style="color:var(--danger)">Blocked</span>':'<span style="color:var(--medium)">Not set</span>'):'<span style="color:var(--textDim)">N/A</span>';
  var h='<div class="section-title" style="margin-bottom:20px">Settings</div>';
  h+='<div class="card" style="padding:20px"><div style="font-size:18px;font-weight:600;margin-bottom:6px">API Key</div><div style="font-size:15px;color:var(--textMuted);margin-bottom:14px">Get at <a href="https://console.anthropic.com/settings/keys" target="_blank">console.anthropic.com</a></div>';
  if(sk)h+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px"><div style="flex:1;background:var(--surfaceHover);border:1px solid var(--border);border-radius:8px;padding:12px;font-family:monospace;font-size:15px;color:var(--success)">'+mk+'</div><button onclick="localStorage.removeItem(\'sage_api_key\');render()" style="background:var(--dangerSoft);border:none;color:var(--danger);border-radius:8px;padding:10px 16px;font-size:15px;cursor:pointer">Remove</button></div>';
  else h+='<input class="input" id="apiKeyInput" type="password" placeholder="sk-ant-..." style="margin-bottom:12px;font-family:monospace"><button onclick="saveApiKey()" class="btn-primary" style="width:100%">Save Key</button>';
  h+='</div>';
  h+='<div class="card" style="padding:20px;margin-top:12px"><div class="row-between"><div><div style="font-size:18px;font-weight:600">Notifications</div><div style="font-size:15px;color:var(--textMuted)">10 min before events</div></div>'+ns+'</div>';
  if('Notification' in window&&Notification.permission==='default')h+='<button onclick="Notification.requestPermission().then(function(){render()})" class="btn-secondary" style="margin-top:12px;width:100%">Enable</button>';
  h+='</div>';
  h+='<div class="card" style="padding:20px;margin-top:12px"><div style="font-size:18px;font-weight:600;margin-bottom:6px">Cloud Sync</div><div style="font-size:15px;color:var(--textMuted);margin-bottom:8px;line-height:1.5">Real-time sync between Samsung and MacBook via Firebase. Changes appear automatically on both devices.</div><div id="syncSettingsStatus" style="font-size:15px">Status: '+(fbRef?'<span style="color:var(--success)">Active</span>':'<span style="color:var(--textDim)">Connecting...</span>')+'</div></div>';
  h+='<div class="card" style="padding:20px;margin-top:12px"><div style="font-size:18px;font-weight:600;margin-bottom:6px">Backup</div><div class="row gap-8"><button onclick="exportData()" class="btn-secondary" style="flex:1">Export</button><button onclick="document.getElementById(\'importFile\').click()" class="btn-secondary" style="flex:1">Import</button></div></div>';
  h+='<div class="card" style="padding:20px;margin-top:12px"><div style="font-size:18px;font-weight:600;margin-bottom:8px">Clear All Data</div><button onclick="if(confirm(\'Delete all data?\')){localStorage.removeItem(\'sage_data\');if(fbRef)fbRef.remove();state=loadState();render()}" style="background:var(--dangerSoft);border:none;color:var(--danger);border-radius:8px;padding:10px 16px;font-size:15px;cursor:pointer">Clear Data</button></div>';
  h+='<div style="text-align:center;margin-top:24px;color:var(--textDim);font-size:13px">Sage v5.0 — Cloud Synced</div>';return h}
function saveApiKey(){var k=(document.getElementById('apiKeyInput')||{}).value;if(!k)return;k=k.trim();if(k.indexOf('sk-ant-')!==0){alert('Should start with sk-ant-');return}localStorage.setItem('sage_api_key',k);render()}
function exportData(){var d=JSON.stringify({tasks:state.tasks,notes:state.notes,events:state.events,chatMessages:state.chatMessages},null,2);var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([d],{type:'application/json'}));a.download='sage-backup-'+todayStr()+'.json';document.body.appendChild(a);a.click();document.body.removeChild(a)}
function importData(inp){var f=inp.files[0];if(!f)return;var r=new FileReader();r.onload=function(e){try{var d=JSON.parse(e.target.result);if(!confirm('Replace all data?'))return;if(d.tasks)state.tasks=d.tasks;if(d.notes)state.notes=d.notes;if(d.events)state.events=d.events;if(d.chatMessages)state.chatMessages=d.chatMessages;save();render();alert('Imported!')}catch(err){alert('Invalid file.')}};r.readAsText(f);inp.value=''}

/* === INIT === */
generateRecurring();initNotifications();initFirebase();render();
</script>
</body>
</html>
