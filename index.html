<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sage">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0C0F14">
<meta name="application-name" content="Sage">
<title>Sage — Personal Secretary</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%23C8A44E'/><stop offset='100%25' stop-color='%23A07D2E'/></linearGradient></defs><rect width='100' height='100' rx='22' fill='%230C0F14'/><circle cx='50' cy='38' r='16' fill='url(%23g)' opacity='0.9'/><path d='M28 72c0-12.15 9.85-22 22-22s22 9.85 22 22' fill='url(%23g)' opacity='0.7'/><path d='M44 34 l4 6 l8-10' stroke='%230C0F14' stroke-width='3' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230C0F14'/><circle cx='50' cy='38' r='16' fill='%23C8A44E' opacity='0.9'/><path d='M28 72c0-12.15 9.85-22 22-22s22 9.85 22 22' fill='%23C8A44E' opacity='0.7'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0C0F14;
    --surface: #151921;
    --surfaceHover: #1C2230;
    --border: #252D3B;
    --borderLight: #1E2636;
    --text: #E8ECF4;
    --textMuted: #7B8499;
    --textDim: #4A5268;
    --accent: #C8A44E;
    --accentSoft: rgba(200,164,78,0.12);
    --success: #4ADE80;
    --successSoft: rgba(74,222,128,0.1);
    --danger: #F87171;
    --dangerSoft: rgba(248,113,113,0.1);
    --high: #F87171;
    --medium: #FBBF24;
    --low: #60A5FA;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    font-family: 'DM Sans','Segoe UI',sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .topbar {
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 20px 12px;
    background:var(--surface);
    border-bottom:1px solid var(--borderLight);
    flex-shrink:0;
  }
  .topbar-brand {
    font-family:'Playfair Display',Georgia,serif;
    font-size:20px; font-weight:700; color:var(--accent);
    letter-spacing:0.5px;
  }
  .topbar-sub { font-size:10px; color:var(--textDim); text-transform:uppercase; letter-spacing:1.5px; }

  .content { flex:1; overflow-y:auto; padding:20px; -webkit-overflow-scrolling:touch; }

  .bottom-nav {
    display:flex; background:var(--surface); border-top:1px solid var(--borderLight);
    flex-shrink:0; padding:6px 0 max(6px,env(safe-area-inset-bottom));
  }
  .nav-btn {
    flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
    padding:8px 0; border:none; background:none; color:var(--textDim);
    font-family:'DM Sans',sans-serif; font-size:10px; cursor:pointer; transition:color .15s;
  }
  .nav-btn.active { color:var(--accent); }
  .nav-btn svg { width:22px; height:22px; }

  .section-title {
    font-family:'Playfair Display',Georgia,serif;
    font-size:24px; font-weight:600; margin-bottom:4px;
  }
  .section-sub { font-size:13px; color:var(--textMuted); margin-bottom:20px; }
  .card {
    background:var(--surface); border:1px solid var(--borderLight);
    border-radius:12px; padding:14px 16px; margin-bottom:8px; transition:border-color .2s;
  }
  .btn-primary {
    background:var(--accent); border:none; color:var(--bg);
    border-radius:10px; padding:10px 20px; font-family:'DM Sans',sans-serif;
    font-size:14px; font-weight:600; cursor:pointer;
  }
  .btn-icon {
    width:36px; height:36px; border-radius:10px; border:none;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    background:var(--accentSoft); color:var(--accent); flex-shrink:0;
  }
  .input {
    width:100%; background:var(--surfaceHover); border:1px solid var(--border);
    border-radius:10px; padding:12px 14px; color:var(--text);
    font-family:'DM Sans',sans-serif; font-size:14px; outline:none;
  }
  .input::placeholder { color:var(--textDim); }
  .input-sm {
    background:var(--surface); border:1px solid var(--border); border-radius:8px;
    padding:7px 10px; color:var(--textMuted); font-family:'DM Sans',sans-serif;
    font-size:12px; outline:none;
  }
  .pill {
    font-size:10px; font-weight:600; letter-spacing:0.5px; text-transform:uppercase;
    padding:2px 8px; border-radius:5px;
  }
  .row { display:flex; align-items:center; gap:10px; }
  .row-between { display:flex; align-items:center; justify-content:space-between; }
  .flex-1 { flex:1; min-width:0; }
  .gap-8 { gap:8px; }
  .mt-10 { margin-top:10px; }
  .mb-12 { margin-bottom:12px; }
  .mb-16 { margin-bottom:16px; }
  .truncate { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  .icon-btn-sm {
    background:none; border:none; color:var(--textDim); cursor:pointer;
    padding:4px; opacity:0.5; display:flex; align-items:center;
  }

  .stat-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:24px; }
  .stat-card {
    background:var(--surface); border:1px solid var(--borderLight);
    border-radius:14px; padding:16px 14px; cursor:pointer; transition:all .2s;
  }
  .stat-card:active { transform:scale(0.97); }
  .stat-value { font-family:'Playfair Display',Georgia,serif; font-size:26px; font-weight:700; }
  .stat-label { font-size:11px; color:var(--textMuted); margin-top:2px; }

  .checkbox {
    width:22px; height:22px; min-width:22px; border-radius:6px;
    border:2px solid var(--border); background:transparent; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    color:var(--success); transition:all .15s; flex-shrink:0;
  }
  .checkbox.done { border-color:var(--success); background:var(--successSoft); }

  .chat-area {
    flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:10px; padding-bottom:8px;
  }
  .msg { max-width:85%; padding:12px 16px; font-size:14px; line-height:1.6; white-space:pre-wrap; }
  .msg-user { align-self:flex-end; background:var(--accent); color:var(--bg); border-radius:16px 16px 4px 16px; }
  .msg-ai { align-self:flex-start; background:var(--surfaceHover); border:1px solid var(--border); border-radius:16px 16px 16px 4px; }
  .chat-input-row { display:flex; gap:8px; margin-top:10px; flex-shrink:0; align-items:center; }

  .send-btn {
    width:46px; height:46px; border-radius:12px; border:none;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; flex-shrink:0; transition:all .2s;
  }

  /* Voice button */
  .voice-btn {
    width:46px; height:46px; border-radius:12px; border:none;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; flex-shrink:0; transition:all .2s;
    background:var(--surfaceHover); color:var(--textMuted);
    position:relative;
  }
  .voice-btn.recording {
    background:var(--dangerSoft); color:var(--danger);
    animation: pulse-ring 1.5s ease infinite;
  }
  @keyframes pulse-ring {
    0% { box-shadow:0 0 0 0 rgba(248,113,113,0.4); }
    70% { box-shadow:0 0 0 10px rgba(248,113,113,0); }
    100% { box-shadow:0 0 0 0 rgba(248,113,113,0); }
  }
  .voice-btn.recording::before {
    content:'';
    position:absolute;
    width:10px; height:10px;
    border-radius:50%;
    background:var(--danger);
    top:6px; right:6px;
    animation:blink-dot 1s infinite;
  }
  @keyframes blink-dot { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .note-item {
    padding:12px 14px; border-radius:10px; cursor:pointer;
    border:1px solid var(--borderLight); background:var(--surface);
    margin-bottom:6px; position:relative; overflow:hidden; transition:border-color .2s;
  }
  .note-item.active { border-color:rgba(200,164,78,0.3); background:var(--surfaceHover); }
  .note-bar { position:absolute; top:0; left:0; width:3px; height:100%; border-radius:10px 0 0 10px; }
  .note-editor {
    width:100%; min-height:200px; background:var(--surface);
    border:1px solid var(--borderLight); border-radius:12px; padding:16px;
    color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px;
    line-height:1.7; outline:none; resize:none;
  }
  .form-panel {
    background:var(--surfaceHover); border-radius:12px; padding:16px;
    margin-bottom:16px; border:1px solid var(--border);
  }
  .priority-btn {
    border-radius:6px; padding:5px 12px; font-size:12px;
    font-family:'DM Sans',sans-serif; cursor:pointer;
    text-transform:capitalize; background:transparent;
  }
  @keyframes blink { 0%,20%{opacity:1} 50%{opacity:.3} 80%,100%{opacity:1} }
  .typing::after { content:'...'; animation:blink 1.4s infinite; }

  /* Voice overlay for non-chat tabs */
  .voice-overlay {
    display:none;
    position:fixed; inset:0;
    background:rgba(12,15,20,0.92);
    z-index:999;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:20px;
  }
  .voice-overlay.active { display:flex; }
  .voice-ring {
    width:120px; height:120px; border-radius:50%;
    background:var(--dangerSoft); border:3px solid var(--danger);
    display:flex; align-items:center; justify-content:center;
    animation:pulse-ring 1.5s ease infinite;
  }
  .voice-ring svg { width:48px; height:48px; color:var(--danger); }
  .voice-transcript {
    font-family:'DM Sans',sans-serif; font-size:18px; color:var(--text);
    text-align:center; max-width:80%; min-height:30px;
  }
  .voice-hint { font-size:13px; color:var(--textMuted); }

  /* Install banner */
  .install-banner {
    display:none;
    background:var(--surfaceHover);
    border:1px solid var(--accent);
    border-radius:12px;
    padding:14px 16px;
    margin-bottom:16px;
    font-size:13px;
    color:var(--textMuted);
    line-height:1.5;
  }
  .install-banner strong { color:var(--accent); }
  .install-banner .dismiss {
    background:none; border:none; color:var(--textDim); cursor:pointer;
    font-size:18px; float:right; margin:-4px -4px 0 8px;
  }
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="topbar-brand">Sage</div>
    <div class="topbar-sub">Personal Secretary</div>
  </div>
  <div style="text-align:right">
    <div style="font-size:13px;font-weight:500">Rafik S. Gabriel</div>
    <div style="font-size:11px;color:var(--textDim)">Chairman · Metal Tube</div>
  </div>
</div>

<div class="content" id="content"></div>

<!-- Voice overlay for non-chat screens -->
<div class="voice-overlay" id="voiceOverlay">
  <div class="voice-ring">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z"/>
    </svg>
  </div>
  <div class="voice-transcript" id="voiceOverlayText">Listening...</div>
  <div class="voice-hint">Tap anywhere to stop</div>
</div>

<div class="bottom-nav">
  <button class="nav-btn active" data-tab="home" onclick="switchTab('home')">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
    Home
  </button>
  <button class="nav-btn" data-tab="tasks" onclick="switchTab('tasks')">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
    Tasks
  </button>
  <button class="nav-btn" data-tab="notes" onclick="switchTab('notes')">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
    Notes
  </button>
  <button class="nav-btn" data-tab="schedule" onclick="switchTab('schedule')">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path stroke-linecap="round" d="M16 2v4M8 2v4M3 10h18"/></svg>
    Schedule
  </button>
  <button class="nav-btn" data-tab="chat" onclick="switchTab('chat')">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
    Sage
  </button>
</div>

<script>
// ── Utilities ──────────────────────────────────────────
const uid = () => Math.random().toString(36).slice(2,10);
const todayStr = () => new Date().toISOString().split('T')[0];
const fmtDate = d => new Date(d+'T12:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
const fmtTime = t => { const [h,m]=t.split(':'); const hr=+h; return `${hr>12?hr-12:hr||12}:${m} ${hr>=12?'PM':'AM'}`; };
const greeting = () => { const h=new Date().getHours(); return h<12?'Good morning':h<17?'Good afternoon':'Good evening'; };
function esc(s) { if(!s) return ''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// ── State ──────────────────────────────────────────────
let state = {
  tab: 'home',
  tasks: [
    {id:uid(),title:'Review BD Manager candidate shortlist',priority:'high',dueDate:todayStr(),done:false,starred:true},
    {id:uid(),title:'Prepare Q1 export performance report',priority:'high',dueDate:'2026-03-07',done:false,starred:false},
    {id:uid(),title:'Follow up with MENA distribution leads',priority:'medium',dueDate:'2026-03-05',done:false,starred:false},
  ],
  notes: [
    {id:uid(),title:'BD Manager Hiring Notes',body:"Key requirements:\n- 5+ years in steel/scaffolding/formwork\n- MENA market experience\n- Strong relationship building\n\nPotential sources:\n- LinkedIn targeting\n- LinkMisr, ACROW competitors",color:'#C8A44E'},
  ],
  events: [
    {id:uid(),title:'Leadership sync with Eng. Samy',date:todayStr(),time:'10:00',duration:60,note:'Monthly review'},
    {id:uid(),title:'BD Manager interview - Round 1',date:'2026-03-05',time:'14:00',duration:45,note:'Candidate from scaffolding sector'},
  ],
  activeNote: null,
  addingTask: false,
  addingEvent: false,
  chatMessages: [{role:'assistant',content:`${greeting()}, Rafik. I'm Sage, your personal secretary. How can I assist you today?\n\nI can help you think through tasks, prepare for meetings, draft communications, or organize your priorities. You can also tap the microphone to speak to me.`}],
  chatLoading: false,
};

// ── Persistence ────────────────────────────────────────
function save() {
  try { localStorage.setItem('sage_state', JSON.stringify({tasks:state.tasks,notes:state.notes,events:state.events,chatMessages:state.chatMessages})); } catch(e){}
}
function load() {
  try {
    const d = JSON.parse(localStorage.getItem('sage_state'));
    if(d) { if(d.tasks) state.tasks=d.tasks; if(d.notes) state.notes=d.notes; if(d.events) state.events=d.events; if(d.chatMessages&&d.chatMessages.length) state.chatMessages=d.chatMessages; }
  } catch(e){}
}
load();

// ── Voice Recognition ──────────────────────────────────
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
let isRecording = false;
let voiceTarget = null; // 'chat' or 'overlay'

function initSpeech() {
  if(!SpeechRecognition) return null;
  const r = new SpeechRecognition();
  r.continuous = false;
  r.interimResults = true;
  r.lang = 'en-US';
  r.maxAlternatives = 1;

  r.onresult = (e) => {
    let transcript = '';
    for(let i = e.resultIndex; i < e.results.length; i++) {
      transcript += e.results[i][0].transcript;
    }
    if(voiceTarget === 'chat') {
      const input = document.getElementById('chatInput');
      if(input) input.value = transcript;
    } else {
      const txt = document.getElementById('voiceOverlayText');
      if(txt) txt.textContent = transcript || 'Listening...';
    }
    // If final result
    if(e.results[e.results.length-1].isFinal) {
      if(voiceTarget === 'chat') {
        const input = document.getElementById('chatInput');
        if(input) input.value = transcript;
      } else {
        processVoiceCommand(transcript);
      }
    }
  };

  r.onend = () => {
    isRecording = false;
    const btn = document.getElementById('voiceBtn');
    if(btn) btn.classList.remove('recording');
    const overlay = document.getElementById('voiceOverlay');
    if(overlay) overlay.classList.remove('active');
  };

  r.onerror = (e) => {
    isRecording = false;
    const btn = document.getElementById('voiceBtn');
    if(btn) btn.classList.remove('recording');
    const overlay = document.getElementById('voiceOverlay');
    if(overlay) overlay.classList.remove('active');
  };

  return r;
}

function startVoice(target) {
  if(!SpeechRecognition) {
    alert('Voice recognition is not supported in this browser. Please use Chrome or Samsung Internet.');
    return;
  }
  if(isRecording) {
    stopVoice();
    return;
  }
  recognition = initSpeech();
  if(!recognition) return;
  voiceTarget = target;
  isRecording = true;

  if(target === 'chat') {
    const btn = document.getElementById('voiceBtn');
    if(btn) btn.classList.add('recording');
  } else {
    const overlay = document.getElementById('voiceOverlay');
    const txt = document.getElementById('voiceOverlayText');
    if(overlay) overlay.classList.add('active');
    if(txt) txt.textContent = 'Listening...';
  }

  try { recognition.start(); } catch(e) { stopVoice(); }
}

function stopVoice() {
  if(recognition) { try { recognition.stop(); } catch(e){} }
  isRecording = false;
  const btn = document.getElementById('voiceBtn');
  if(btn) btn.classList.remove('recording');
  const overlay = document.getElementById('voiceOverlay');
  if(overlay) overlay.classList.remove('active');
}

// Process voice commands from non-chat screens
function processVoiceCommand(text) {
  const lower = text.toLowerCase().trim();
  // Quick add task
  if(lower.startsWith('add task') || lower.startsWith('new task')) {
    const title = text.replace(/^(add|new)\s*task\s*/i, '').trim();
    if(title) {
      state.tasks.push({id:uid(),title:title,priority:'medium',dueDate:todayStr(),done:false,starred:false});
      render();
      return;
    }
  }
  // Quick add event
  if(lower.startsWith('add event') || lower.startsWith('new event') || lower.startsWith('schedule')) {
    const title = text.replace(/^(add|new)\s*event\s*|^schedule\s*/i, '').trim();
    if(title) {
      state.events.push({id:uid(),title:title,date:todayStr(),time:'09:00',duration:60,note:''});
      render();
      return;
    }
  }
  // Quick add note
  if(lower.startsWith('add note') || lower.startsWith('new note') || lower.startsWith('note')) {
    const title = text.replace(/^(add|new)?\s*note\s*/i, '').trim();
    const colors=['#C8A44E','#60A5FA','#F87171','#A78BFA','#34D399'];
    state.notes.unshift({id:uid(),title:title||'Voice Note',body:'',color:colors[Math.floor(Math.random()*5)]});
    render();
    return;
  }
  // Default: switch to chat and send as message
  state.tab = 'chat';
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.tab==='chat'));
  state.chatMessages.push({role:'user',content:text});
  state.chatLoading = true;
  render();
  sendChatAPI(text);
}

// Close voice overlay on tap
document.getElementById('voiceOverlay').addEventListener('click', () => stopVoice());

// ── Render ─────────────────────────────────────────────
const $content = document.getElementById('content');

function switchTab(tab) {
  state.tab = tab;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.tab===tab));
  render();
}

function render() {
  const fn = {home:renderHome, tasks:renderTasks, notes:renderNotes, schedule:renderSchedule, chat:renderChat};
  $content.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.style.cssText = 'display:flex;flex-direction:column;height:100%;';
  wrap.innerHTML = fn[state.tab]();
  $content.appendChild(wrap);
  if(state.tab==='chat') {
    const area = document.getElementById('chatArea');
    if(area) area.scrollTop = area.scrollHeight;
  }
  save();
}

// ── Home ───────────────────────────────────────────────
function renderHome() {
  const pending = state.tasks.filter(t=>!t.done);
  const todayEvents = state.events.filter(e=>e.date===todayStr());
  const dateStr = new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  const prOrder = {high:0,medium:1,low:2};
  const topTasks = [...pending].sort((a,b)=>prOrder[a.priority]-prOrder[b.priority]).slice(0,3);

  return `
    <div style="margin-bottom:32px">
      <div style="font-size:12px;color:var(--textMuted);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px">${dateStr}</div>
      <div class="section-title" style="font-size:30px">${greeting()}, <span style="color:var(--accent)">Rafik</span></div>
      <p style="font-size:14px;color:var(--textMuted);margin-top:6px">Here's your overview for today.</p>
    </div>

    <div id="installBanner" class="install-banner">
      <button class="dismiss" onclick="this.parentElement.style.display='none'">&times;</button>
      <strong>Install Sage</strong> as an app on your device:<br>
      <b>Samsung:</b> Tap ⋮ menu → "Add page to" → "Home screen"<br>
      <b>MacBook:</b> Open in Chrome → ⋮ menu → "Install Sage..."
    </div>

    <!-- Voice quick action -->
    <div onclick="startVoice('overlay')" style="background:var(--surface);border:1px solid var(--borderLight);border-radius:14px;padding:16px;margin-bottom:16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .2s">
      <div style="width:44px;height:44px;border-radius:12px;background:var(--accentSoft);display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="var(--accent)" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z"/></svg>
      </div>
      <div>
        <div style="font-size:14px;font-weight:500;color:var(--text)">Voice Command</div>
        <div style="font-size:12px;color:var(--textDim)">Tap to speak — "Add task...", "Schedule...", or ask Sage</div>
      </div>
    </div>

    <div class="stat-grid">
      <div class="stat-card" onclick="switchTab('tasks')">
        <div class="stat-value" style="color:var(--medium)">${pending.length}</div>
        <div class="stat-label">Pending</div>
      </div>
      <div class="stat-card" onclick="switchTab('schedule')">
        <div class="stat-value" style="color:var(--accent)">${todayEvents.length}</div>
        <div class="stat-label">Today</div>
      </div>
      <div class="stat-card" onclick="switchTab('tasks')">
        <div class="stat-value" style="color:var(--success)">${state.tasks.filter(t=>t.done).length}</div>
        <div class="stat-label">Done</div>
      </div>
    </div>
    ${topTasks.length ? `
      <div style="font-size:11px;color:var(--textMuted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">Priority Tasks</div>
      ${topTasks.map(t=>`
        <div class="card row gap-8">
          <span style="width:8px;height:8px;border-radius:50%;background:var(--${t.priority});flex-shrink:0"></span>
          <span class="flex-1 truncate" style="font-size:14px">${esc(t.title)}</span>
          <span style="font-size:11px;color:var(--textDim);flex-shrink:0">${fmtDate(t.dueDate)}</span>
        </div>
      `).join('')}
    `:''}
    ${todayEvents.length ? `
      <div style="font-size:11px;color:var(--textMuted);text-transform:uppercase;letter-spacing:1px;margin:20px 0 10px">Today's Schedule</div>
      ${todayEvents.map(e=>`
        <div class="card row gap-8">
          <span style="min-width:56px;font-size:13px;font-weight:600;color:var(--accent)">${fmtTime(e.time)}</span>
          <span style="font-size:14px">${esc(e.title)}</span>
        </div>
      `).join('')}
    `:''}
  `;
}

// ── Tasks ──────────────────────────────────────────────
function renderTasks() {
  const pending = state.tasks.filter(t=>!t.done).length;
  const prOrder = {high:0,medium:1,low:2};
  const sorted = [...state.tasks].sort((a,b)=>{
    if(a.done!==b.done) return a.done?1:-1;
    if(a.starred!==b.starred) return b.starred?1:-1;
    return prOrder[a.priority]-prOrder[b.priority];
  });

  return `
    <div class="row-between mb-16">
      <div>
        <div class="section-title">Tasks</div>
        <div class="section-sub" style="margin-bottom:0">${pending} pending</div>
      </div>
      <div class="row gap-8">
        <button class="btn-icon" style="background:var(--surfaceHover);color:var(--textMuted)" onclick="startVoice('overlay')">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z"/></svg>
        </button>
        <button class="btn-icon" onclick="state.addingTask=!state.addingTask;render()">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" d="M12 5v14m-7-7h14"/></svg>
        </button>
      </div>
    </div>
    ${state.addingTask ? `
      <div class="form-panel">
        <input class="input mb-12" id="taskTitle" placeholder="What needs to be done?" onkeydown="if(event.key==='Enter')addTask()">
        <div class="row gap-8" style="flex-wrap:wrap">
          ${['high','medium','low'].map(p=>`<button class="priority-btn" style="border:1px solid var(--${p});color:var(--${p})" onclick="document.getElementById('taskPriority').value='${p}';this.parentElement.querySelectorAll('.priority-btn').forEach(b=>b.style.background='transparent');this.style.background='var(--${p})22'">${p}</button>`).join('')}
          <input type="hidden" id="taskPriority" value="medium">
          <input type="date" class="input-sm" id="taskDate" value="${todayStr()}" style="margin-left:auto">
          <button class="btn-primary" onclick="addTask()">Add</button>
        </div>
      </div>
    `:''}
    <div style="flex:1;overflow-y:auto">
      ${sorted.length===0 ? '<div style="text-align:center;padding:40px;color:var(--textDim);font-size:14px">No tasks yet.</div>' :
        sorted.map(t=>`
          <div class="card row gap-8" style="opacity:${t.done?.5:1}">
            <button class="checkbox ${t.done?'done':''}" onclick="toggleTask('${t.id}')">
              ${t.done?'<svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>':''}
            </button>
            <div class="flex-1" style="min-width:0">
              <div class="truncate" style="font-size:14px;${t.done?'text-decoration:line-through':''}">${esc(t.title)}</div>
              <div class="row gap-8" style="margin-top:4px">
                <span class="pill" style="color:var(--${t.priority});background:color-mix(in srgb,var(--${t.priority}) 12%,transparent)">${t.priority}</span>
                <span style="font-size:11px;color:var(--textDim)">${fmtDate(t.dueDate)}</span>
              </div>
            </div>
            <button class="icon-btn-sm" style="color:${t.starred?'var(--accent)':'var(--textDim)'};opacity:${t.starred?1:.4}" onclick="toggleStar('${t.id}')">
              <svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            </button>
            <button class="icon-btn-sm" onclick="removeTask('${t.id}')">
              <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
            </button>
          </div>
        `).join('')}
    </div>
  `;
}
function addTask(){
  const t=document.getElementById('taskTitle')?.value?.trim();if(!t) return;
  state.tasks.push({id:uid(),title:t,priority:document.getElementById('taskPriority')?.value||'medium',dueDate:document.getElementById('taskDate')?.value||todayStr(),done:false,starred:false});
  state.addingTask=false; render();
}
function toggleTask(id){ const t=state.tasks.find(x=>x.id===id); if(t) t.done=!t.done; render(); }
function toggleStar(id){ const t=state.tasks.find(x=>x.id===id); if(t) t.starred=!t.starred; render(); }
function removeTask(id){ state.tasks=state.tasks.filter(x=>x.id!==id); render(); }

// ── Notes ──────────────────────────────────────────────
function renderNotes() {
  const an = state.notes.find(n=>n.id===state.activeNote);
  return `
    <div class="row-between mb-16">
      <div class="section-title">Notes</div>
      <button class="btn-icon" onclick="addNote()">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" d="M12 5v14m-7-7h14"/></svg>
      </button>
    </div>
    ${!an ? `
      ${state.notes.length===0 ? '<div style="text-align:center;padding:40px;color:var(--textDim);font-size:14px">No notes yet.</div>' :
        state.notes.map(n=>`
          <div class="note-item" onclick="state.activeNote='${n.id}';render()">
            <div class="note-bar" style="background:${n.color}"></div>
            <div class="truncate" style="font-size:14px;font-weight:500;padding-left:6px">${esc(n.title)||'Untitled'}</div>
            <div class="truncate" style="font-size:12px;color:var(--textDim);margin-top:4px;padding-left:6px">${esc(n.body?.slice(0,80))||'Empty note'}</div>
          </div>
        `).join('')}
    ` : `
      <div class="row-between mb-12">
        <button class="icon-btn-sm" style="opacity:1;color:var(--textMuted);margin-right:8px" onclick="state.activeNote=null;render()">
          <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" d="M15 19l-7-7 7-7"/></svg>
        </button>
        <input class="input flex-1" value="${esc(an.title)}" onchange="updateNote('${an.id}','title',this.value)" style="background:transparent;border:none;font-family:'Playfair Display',serif;font-size:20px;font-weight:600;padding:0">
        <button class="icon-btn-sm" style="opacity:1;color:var(--danger)" onclick="removeNote('${an.id}')">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
        </button>
      </div>
      <textarea class="note-editor" style="flex:1" oninput="updateNote('${an.id}','body',this.value)" placeholder="Start typing...">${esc(an.body)}</textarea>
    `}
  `;
}
function addNote(){
  const colors=['#C8A44E','#60A5FA','#F87171','#A78BFA','#34D399'];
  state.notes.unshift({id:uid(),title:'Untitled Note',body:'',color:colors[Math.floor(Math.random()*5)]});
  state.activeNote=state.notes[0].id; render();
}
function updateNote(id,field,val){ const n=state.notes.find(x=>x.id===id); if(n) n[field]=val; save(); }
function removeNote(id){ state.notes=state.notes.filter(x=>x.id!==id); state.activeNote=null; render(); }

// ── Schedule ───────────────────────────────────────────
function renderSchedule() {
  const sorted = [...state.events].sort((a,b)=>`${a.date}${a.time}`.localeCompare(`${b.date}${b.time}`));
  const grouped = {}; sorted.forEach(e=>{ if(!grouped[e.date]) grouped[e.date]=[]; grouped[e.date].push(e); });
  const upcoming = Object.keys(grouped).filter(d=>d>=todayStr()).sort();
  const past = Object.keys(grouped).filter(d=>d<todayStr()).sort().reverse();

  return `
    <div class="row-between mb-16">
      <div>
        <div class="section-title">Schedule</div>
        <div class="section-sub" style="margin-bottom:0">${state.events.filter(e=>e.date>=todayStr()).length} upcoming</div>
      </div>
      <div class="row gap-8">
        <button class="btn-icon" style="background:var(--surfaceHover);color:var(--textMuted)" onclick="startVoice('overlay')">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z"/></svg>
        </button>
        <button class="btn-icon" onclick="state.addingEvent=!state.addingEvent;render()">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" d="M12 5v14m-7-7h14"/></svg>
        </button>
      </div>
    </div>
    ${state.addingEvent ? `
      <div class="form-panel">
        <input class="input mb-12" id="evTitle" placeholder="Event title" onkeydown="if(event.key==='Enter')addEvent()">
        <div class="row gap-8" style="flex-wrap:wrap">
          <input type="date" class="input-sm" id="evDate" value="${todayStr()}">
          <input type="time" class="input-sm" id="evTime" value="09:00">
          <select class="input-sm" id="evDuration"><option value="15">15 min</option><option value="30">30 min</option><option value="60" selected>1 hr</option><option value="90">1.5 hr</option><option value="120">2 hr</option></select>
          <button class="btn-primary" onclick="addEvent()" style="margin-left:auto">Add</button>
        </div>
        <input class="input mt-10" id="evNote" placeholder="Notes (optional)" style="font-size:13px">
      </div>
    `:''}
    <div style="flex:1;overflow-y:auto">
      ${upcoming.length===0&&past.length===0 ? '<div style="text-align:center;padding:40px;color:var(--textDim);font-size:14px">No events scheduled.</div>':''}
      ${upcoming.map(date=>`
        <div style="margin-bottom:18px">
          <div style="font-size:11px;font-weight:600;color:${date===todayStr()?'var(--accent)':'var(--textMuted)'};text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">${date===todayStr()?'Today':fmtDate(date)}</div>
          ${grouped[date].map(ev=>`
            <div class="card row gap-8" style="align-items:flex-start">
              <span style="min-width:56px;font-size:13px;font-weight:600;color:var(--accent)">${fmtTime(ev.time)}</span>
              <div class="flex-1"><div style="font-size:14px">${esc(ev.title)}</div><div style="font-size:12px;color:var(--textDim);margin-top:2px">${ev.duration} min${ev.note?' · '+esc(ev.note):''}</div></div>
              <button class="icon-btn-sm" onclick="removeEvent('${ev.id}')"><svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button>
            </div>
          `).join('')}
        </div>
      `).join('')}
      ${past.length?`<div style="font-size:11px;color:var(--textDim);text-transform:uppercase;letter-spacing:1px;margin:10px 0 8px;border-top:1px solid var(--border);padding-top:14px">Past</div>${past.map(date=>`<div style="margin-bottom:12px;opacity:.5"><div style="font-size:11px;color:var(--textDim);margin-bottom:6px">${fmtDate(date)}</div>${grouped[date].map(ev=>`<div class="card row gap-8" style="padding:10px 14px"><span style="min-width:56px;font-size:12px;color:var(--textDim)">${fmtTime(ev.time)}</span><span style="font-size:13px;color:var(--textMuted)">${esc(ev.title)}</span></div>`).join('')}</div>`).join('')}`:''}
    </div>
  `;
}
function addEvent(){
  const t=document.getElementById('evTitle')?.value?.trim();if(!t) return;
  state.events.push({id:uid(),title:t,date:document.getElementById('evDate').value,time:document.getElementById('evTime').value,duration:+document.getElementById('evDuration').value,note:document.getElementById('evNote')?.value||''});
  state.addingEvent=false; render();
}
function removeEvent(id){ state.events=state.events.filter(x=>x.id!==id); render(); }

// ── Chat ───────────────────────────────────────────────
function renderChat() {
  return `
    <div class="row-between" style="margin-bottom:16px">
      <div class="section-title">Sage</div>
      <div style="font-size:12px;color:var(--textDim)">AI Secretary</div>
    </div>
    <div class="chat-area" id="chatArea" style="flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px">
      ${state.chatMessages.map(m=>`<div class="msg ${m.role==='user'?'msg-user':'msg-ai'}">${esc(m.content)}</div>`).join('')}
      ${state.chatLoading?'<div class="msg msg-ai"><span class="typing">Thinking</span></div>':''}
    </div>
    <div class="chat-input-row">
      <input class="input" id="chatInput" placeholder="Ask Sage anything..." onkeydown="if(event.key==='Enter'&&!event.shiftKey)sendChat()" style="flex:1">
      <button class="voice-btn ${isRecording&&voiceTarget==='chat'?'recording':''}" id="voiceBtn" onclick="startVoice('chat')">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z"/></svg>
      </button>
      <button class="send-btn" style="background:var(--accentSoft);color:var(--accent)" onclick="sendChat()">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14m-4-4l4 4-4 4"/></svg>
      </button>
    </div>
  `;
}

async function sendChat() {
  const input = document.getElementById('chatInput');
  const msg = input?.value?.trim();
  if(!msg || state.chatLoading) return;
  input.value = '';
  state.chatMessages.push({role:'user',content:msg});
  state.chatLoading = true;
  render();
  await sendChatAPI(msg);
}

async function sendChatAPI(msg) {
  const context = `You are Sage, Rafik's personal secretary AI. Rafik is the Chairman of Metal Tube, a steel manufacturing company in Egypt (10th of Ramadan, Sharkia). The company operates in Metal Projects, Scaffolding, Formwork, Storage, Sports Structures, and Metal Arts with 200+ employees.

Current context:
- Active tasks: ${state.tasks.filter(t=>!t.done).map(t=>`"${t.title}" (${t.priority}, due ${t.dueDate})`).join('; ')||'None'}
- Notes: ${state.notes.map(n=>`"${n.title}"`).join(', ')||'None'}
- Upcoming events: ${state.events.filter(e=>e.date>=todayStr()).map(e=>`"${e.title}" on ${e.date} at ${e.time}`).join('; ')||'None'}

Be professional, concise, and proactive. Keep responses under 200 words unless more detail is requested.`;

  const history = state.chatMessages.slice(-10).map(m=>({role:m.role,content:m.content}));

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:context,messages:history})
    });
    const data = await res.json();
    const reply = data.content?.map(b=>b.text||'').join('\n') || "I apologize — I wasn't able to process that. Could you try again?";
    state.chatMessages.push({role:'assistant',content:reply});
  } catch(e) {
    state.chatMessages.push({role:'assistant',content:"I'm having trouble connecting right now. Please try again in a moment."});
  }
  state.chatLoading = false;
  render();
}

// ── Install prompt ─────────────────────────────────────
window.addEventListener('load', () => {
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  if(!isStandalone) {
    setTimeout(() => {
      const banner = document.getElementById('installBanner');
      if(banner) banner.style.display = 'block';
    }, 1000);
  }
});

// ── Init ───────────────────────────────────────────────
render();
</script>
</body>
</html>
